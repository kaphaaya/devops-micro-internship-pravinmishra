version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hbos-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-hbos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hbos_dev_password}
      POSTGRES_DB: ${DB_NAME:-hbos_development}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hbos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hbos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: hbos-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - hbos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hbos-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - postgres
      - redis
    networks:
      - hbos_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database UI) - Development only
  adminer:
    image: adminer:latest
    container_name: hbos-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - hbos_network
    profiles:
      - dev

  # Redis Commander (Redis UI) - Development only
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: hbos-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - hbos_network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  hbos_network:
    driver: bridge

# Usage:
# docker-compose up -d                          # Start all services
# docker-compose up -d --profile dev            # Include dev tools (Adminer, Redis Commander)
# docker-compose down                           # Stop all services
# docker-compose logs -f postgres               # View postgres logs
# docker-compose exec postgres psql -U hbos     # Connect to postgres
# docker-compose exec redis redis-cli           # Connect to redis
